services:
  - type: web
    name: surfing-fake
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_DEMO_MODE
        value: "false"
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: "no-store, no-cache, must-revalidate, max-age=0"
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; base-uri 'none'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; font-src 'self' data:; form-action 'self'; frame-ancestors 'none'; img-src 'self' data: blob: https://*.supabase.co; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; upgrade-insecure-requests"
      - path: /*
        name: Permissions-Policy
        value: "camera=(), geolocation=(), microphone=(), payment=(), usb=()"
      - path: /*
        name: Referrer-Policy
        value: no-referrer
      - path: /*
        name: Strict-Transport-Security
        value: "max-age=31536000; includeSubDomains"
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
